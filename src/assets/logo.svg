<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Bakgrund (transparent, ta bort rect om du vill ha helt transparent) -->
  <rect width="256" height="256" fill="transparent"/>

  <!-- Tavlans centrum -->
  <circle cx="128" cy="128" r="100" fill="white" stroke="black" stroke-width="4"/>

  <!-- Ringar (pistol/precision-stil, svart/vit) -->
  <circle cx="128" cy="128" r="90" fill="none" stroke="black" stroke-width="3"/>
  <circle cx="128" cy="128" r="75" fill="none" stroke="black" stroke-width="3"/>
  <circle cx="128" cy="128" r="60" fill="none" stroke="black" stroke-width="3"/>
  <circle cx="128" cy="128" r="45" fill="none" stroke="black" stroke-width="3"/>
  <circle cx="128" cy="128" r="30" fill="none" stroke="black" stroke-width="3"/>
  <circle cx="128" cy="128" r="15" fill="black"/>

  <!-- Kulhål (små svarta hål med vit \"papperskant\") -->
  <!-- Hål 1 -->
  <circle cx="140" cy="120" r="5" fill="black"/>
  <circle cx="140" cy="120" r="8" fill="none" stroke="white" stroke-width="2"/>

  <!-- Hål 2 -->
  <circle cx="120" cy="135" r="5" fill="black"/>
  <circle cx="120" cy="135" r="8" fill="none" stroke="white" stroke-width="2"/>

  <!-- Hål 3 -->
  <circle cx="132" cy="110" r="5" fill="black"/>
  <circle cx="132" cy="110" r="8" fill="none" stroke="white" stroke-width="2"/>

  <!-- Hål 4 lite längre ut -->
  <circle cx="150" cy="145" r="5" fill="black"/>
  <circle cx="150" cy="145" r="8" fill="none" stroke="white" stroke-width="2"/>
</svg>